name: Claude Code Review Trigger

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write
  actions: read

jobs:
  claude-review:
    uses: ./.github/workflows/apps-claude-code-review.yml
    secrets:
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
