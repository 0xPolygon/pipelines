name: npm release

# The release flow for Apps Team monorepos using changesets + pnpm deploy.
#
# Replaces an earlier bash-script-driven version that committed a
# regenerated lockfile and tagged it separately. The whole post-publish
# dance turned out to be solving a problem `pnpm deploy` already solved:
# Docker bundles workspace source directly, so registry resolution at the
# release tag is irrelevant — the lockfile commit was a no-op in
# practice (release histories had zero `chore: update lockfile after
# publish` entries despite many releases). Removing it lets the workflow
# collapse to a single `changesets/action` invocation.
#
# `createGithubReleases: true` extracts each version's `## <version>`
# section from the matching package's `CHANGELOG.md` and posts it as the
# release body — same canonical algorithm as changesets-action's
# upstream behaviour, no custom port required.

on:
  workflow_call:
    inputs:
      snapshot_tag:
        description: >
          npm dist-tag under which to publish a *throwaway prerelease
          snapshot* (e.g. `pre-3.9.8`, `canary`, `next-feature-x`).
          When set, the workflow runs the snapshot job (`changeset
          version --snapshot <tag>` then `changeset publish --tag <tag>
          --no-git-tag`) instead of the standard release job. Leave
          empty for a normal `push`-triggered release.

          **Must not be a semver-shaped value** (`3.9.8`, `v3.9.8`,
          `3.9.8-beta.1`, etc.) — the snapshot path bypasses the
          release pipeline (no git tag, no GitHub Release), so using a
          real version string would silently publish under that
          dist-tag without doing the rest of the release. The job
          validates the input and aborts on a semver-shaped value.
        type: string
        required: false
        default: ''
    secrets:
      CHANGESET_RELEASE_BOT_APP_ID:
        required: true
      CHANGESET_RELEASE_BOT_APP_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm OIDC trusted publishing

jobs:
  release:
    # Standard release flow: changesets PR → publish → tag → GitHub Release.
    # Skipped when `snapshot_tag` is set — that's a snapshot publish handled below.
    if: inputs.snapshot_tag == ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ secrets.CHANGESET_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.CHANGESET_RELEASE_BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
          # No node-auth-token — npm auth handled by OIDC

      # The release PR replaces workspace:* with real semver ranges for all
      # intra-monorepo deps (e.g. ^2.0.0). Those versions don't exist on
      # npm yet — they're what we're about to publish.
      # --config.link-workspace-packages=true overrides .npmrc so pnpm
      # resolves those ranges against local workspace versions instead of
      # the registry, making the install succeed regardless of which
      # packages are being co-released. --no-frozen-lockfile because
      # `changeset version` updates package.json but not the lockfile, so
      # the lockfile is structurally stale at the release-PR merge commit.
      - run: pnpm install --no-frozen-lockfile --config.link-workspace-packages=true

      # Safety net for consumers that forgot a `prepublishOnly` (or
      # `prepack`) script in their published package's package.json.
      # `dist/` is typically gitignored, so without a build hook the
      # publish ships an empty tarball (just package.json + license +
      # README) — silently broken on first install. matic.js@3.9.9 went
      # out this way; consumers got no compiled code and the package
      # had to be deprecated and republished as 3.9.10. Building here
      # unconditionally guards every consumer against the same trap.
      # `--if-present` skips packages without a `build` script (services,
      # internal-only utilities). Packages that already have a publish
      # lifecycle hook will run their own build again — idempotent
      # against a clean tree.
      - run: pnpm -r run --if-present build

      - uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          title: 'changesets: Release / Deploy'
          commit: 'release: version packages'
          # github-api mode signs commits with GitHub's GPG key, satisfying
          # the repository's signed-commits requirement. git-cli (the
          # default) produces unsigned commits.
          commitMode: github-api
          # On a push that consumed all changesets (the release-PR merge),
          # run publish: capture published packages, push their tags, and
          # create a GitHub Release per tag with the body extracted from
          # each package's CHANGELOG.md `## <version>` section.
          publish: pnpm exec changeset publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # No NPM_TOKEN — using OIDC trusted publishing.
          # changesets/action v1.7.0 only writes auth token to .npmrc when
          # NPM_TOKEN is set; leaving it unset allows npm to use OIDC
          # automatically.

  snapshot:
    # Snapshot publish: bumps versions in-place on the runner (never
    # committed) and publishes under a custom dist-tag via OIDC. Used to
    # ship prereleases ahead of a real release tag — e.g. `pre-3.9.8`
    # consumed by a downstream service while the matching changeset is
    # still in review.
    #
    # Independent of the release job: snapshots don't push git tags or
    # create GitHub Releases. The standard release path remains the
    # only way to cut a real version.
    if: inputs.snapshot_tag != ''
    runs-on: ubuntu-latest
    steps:
      # Refuse semver-shaped inputs. The snapshot path bypasses the
      # release pipeline entirely — using a real version string here
      # (e.g. `3.9.8`) would publish under that dist-tag without
      # pushing the git tag or creating a GitHub Release. Catching this
      # loudly is the whole point of the `snapshot_tag` rename.
      - name: Validate snapshot_tag
        env:
          SNAPSHOT_TAG: ${{ inputs.snapshot_tag }}
        shell: bash
        run: |
          if [[ "$SNAPSHOT_TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([+-].*)?$ ]]; then
            echo "::error title=Invalid snapshot_tag::snapshot_tag '$SNAPSHOT_TAG' looks like a semver release version. The snapshot path bypasses the release pipeline (no git tag, no GitHub Release). For a real release, merge the changesets Release / Deploy PR. Use a non-semver dist-tag (e.g. 'pre-3.9.8', 'canary', 'next-feature-x')."
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
          # No node-auth-token — npm auth handled by OIDC trusted publishing

      # See the comment on the equivalent step in the `release` job: snapshot
      # version() rewrites workspace:* to e.g. 0.0.0-pre-3.9.8-<timestamp>
      # for every co-published package, and those versions don't exist on
      # npm. --config.link-workspace-packages=true keeps the install
      # resolvable against the local workspace.
      - run: pnpm install --no-frozen-lockfile --config.link-workspace-packages=true

      - name: Version snapshot
        # Bumps versions on the runner only — never committed.
        # `snapshot_tag` is user-controlled (workflow_dispatch input),
        # so route it through env: rather than `${{ ... }}` to avoid
        # script injection.
        env:
          SNAPSHOT_TAG: ${{ inputs.snapshot_tag }}
        shell: bash
        run: pnpm exec changeset version --snapshot "$SNAPSHOT_TAG"

      # See the equivalent step in the `release` job: a snapshot
      # publish is just as exposed to the missing-`prepublishOnly`
      # trap as a real release, so apply the same workflow-level guard.
      - run: pnpm -r run --if-present build

      - name: Publish snapshot
        # `--snapshot` is intentionally NOT passed to `changeset publish`:
        # the publish command only destructures `{ otp, tag, gitTag }`
        # from its flags. In `@changesets/cli` ≤2.30.x `--snapshot` is
        # silently dropped; in ≥2.31.0 a `validateCommandFlags` step
        # rejects it as an unknown flag (exit 1). The previous `version`
        # step is the only place `--snapshot` is meaningful — it
        # produces the `0.0.0-<tag>-<timestamp>` runner-local version
        # that publish then ships under the dist-tag below.
        #
        # `--no-git-tag` because a snapshot is ephemeral; tagging the
        # runner state would clutter the repo with disposable refs and
        # risk triggering downstream tag-driven workflows.
        env:
          SNAPSHOT_TAG: ${{ inputs.snapshot_tag }}
        shell: bash
        run: pnpm exec changeset publish --tag "$SNAPSHOT_TAG" --no-git-tag
