name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: CI - lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/ci
