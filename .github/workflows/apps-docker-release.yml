name: Docker release

on:
  workflow_call:
    inputs:
      image_name:
        description: Docker image name (e.g. gas-station)
        required: true
        type: string
      image_tag:
        description: Semver version (e.g. 1.2.3)
        required: true
        type: string
      dockerfile_path:
        description: Path to Dockerfile relative to repo root
        required: true
        type: string
      checkout_ref:
        description: Git ref to check out for the GCP build
        required: true
        type: string
    secrets:
      build_params_gh_secret_keys:
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  docker-release:
    uses: ./.github/workflows/gcp_pipeline_release_image.yaml
    secrets:
      build_params_gh_secret_keys: ${{ secrets.build_params_gh_secret_keys }}
    with:
      image_name: ${{ inputs.image_name }}
      image_tag: ${{ inputs.image_tag }}
      dockerfile_path: ${{ inputs.dockerfile_path }}
      checkout_ref: ${{ inputs.checkout_ref }}
