name: Claude Code

on:
  workflow_call:
    secrets:
      CLAUDE_API_KEY:
        required: true

permissions: {}

jobs:
  claude:
    # Only run when @claude is mentioned AND either:
    # - It's a regular issue (not a PR)
    # - The PR is from the same repo (not a fork)
    # - The comment author has write access or higher
    # Skip changeset-release branches — those are automated version-bump PRs.
    # github.head_ref is not set for comment/review events; use event.pull_request.head.ref instead
    # (empty string for non-PR events, so the startsWith check safely passes through).
    if: |
      !startsWith(github.event.pull_request.head.ref, 'changeset-release/') && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      ) && (
        !github.event.issue.pull_request ||
        github.event.issue.pull_request.head.repo.full_name == github.repository ||
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) ||
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@df37d2f0760a4b5683a6e617c9325bc1a36443f6 # v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          claude_args: |
            --model claude-opus-4-6
          additional_permissions: |
            actions: read
