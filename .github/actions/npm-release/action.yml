name: npm release
description: >
  Publishes packages to npm, commits an updated lockfile, pushes version tags,
  creates GitHub Releases, and updates the release PR description.
  Called from npm-release.yml after changesets/action detects a merged release PR.

inputs:
  gh_token:
    description: App token with contents:write and pull-requests:write
    required: true
  changeset_pr_number:
    description: Pull request number of the release PR to annotate (optional)
    required: false
    default: ''
  default_branch:
    description: >
      Repository default branch — used for the post-publish lockfile commit
      (PATCH refs/heads/<default_branch>) and the fast-forward fetch before
      tagging. Override only for repos whose default is not `main`
      (e.g. matic.js uses `master`).
    required: false
    default: main

runs:
  using: composite
  steps:
    - name: Publish, tag and release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        CHANGESET_PR_NUMBER: ${{ inputs.changeset_pr_number }}
        DEFAULT_BRANCH: ${{ inputs.default_branch }}
      run: bash "$GITHUB_ACTION_PATH/run.sh"
