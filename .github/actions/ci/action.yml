name: CI
description: >
  Lint, typecheck, and test a pnpm Node.js project. Runs in the calling
  job's environment, so env vars composed from secrets in the trigger file
  are automatically available to the test step without any special passing.
  Skipped automatically on changeset-release/* branches — those branches
  contain only version bumps and changelog entries, never code changes.

runs:
  using: composite
  steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      if: "!startsWith(github.head_ref, 'changeset-release/')"
    - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
      if: "!startsWith(github.head_ref, 'changeset-release/')"
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      if: "!startsWith(github.head_ref, 'changeset-release/')"
      with:
        node-version-file: .nvmrc
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      if: "!startsWith(github.head_ref, 'changeset-release/')"
      shell: bash
    - run: pnpm run lint
      if: "!startsWith(github.head_ref, 'changeset-release/')"
      shell: bash
    - run: pnpm run --if-present typecheck
      if: "!startsWith(github.head_ref, 'changeset-release/')"
      shell: bash
    - run: pnpm run --if-present test
      if: "!startsWith(github.head_ref, 'changeset-release/')"
      shell: bash
