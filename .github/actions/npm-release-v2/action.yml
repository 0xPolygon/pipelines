name: npm release (v2)
description: >
  Shadow of `npm-release` with a pinned, patched `@changesets/cli`.
  Validate via `apps-npm-release-v2.yml` in a consuming repo first;
  a follow-up PR collapses this into `npm-release` and deletes the v2
  files. Do not adopt this action in new consumers without coordinating
  with the team lead.

inputs:
  gh_token:
    description: App token with contents:write and pull-requests:write
    required: true
  changeset_pr_number:
    description: Pull request number of the release PR to annotate (optional)
    required: false
    default: ''

runs:
  using: composite
  steps:
    # Install the action's own pinned toolchain (@changesets/cli + upstream
    # patch) into its own node_modules. Isolated from whatever version the
    # consuming repo has pinned — the release pipeline's behaviour is
    # controlled here, not by each consuming repo's devDependencies.
    - name: Install pinned action toolkit
      shell: bash
      working-directory: ${{ github.action_path }}
      run: pnpm install --frozen-lockfile
    - name: Publish, tag and release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        CHANGESET_PR_NUMBER: ${{ inputs.changeset_pr_number }}
        ACTION_BIN: ${{ github.action_path }}/node_modules/.bin
      run: bash "$GITHUB_ACTION_PATH/run.sh"
